<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <header>
      <h1>Images responsive (img tag)</h1>
    </header>
  <main>
    
    
      <img src="https://picsum.photos/200/300" 
       srcset="https://picsum.photos/200/300 400w, 
               https://picsum.photos/200/300 800w, 
               https://picsum.photos/200/300 1600w" 
       sizes="(max-width: 600px) 100vw, 
              (max-width: 1200px) 50vw, 
              800px" 
        loading="lazy"
       alt="A beautiful tropical beach at sunset">

       
        <img src="https://picsum.photos/seed/picsum/200/300" 
       srcset="https://picsum.photos/seed/picsum/200/300 400w, 
               https://picsum.photos/seed/picsum/200/300 800w, 
               https://picsum.photos/seed/picsum/200/300 1600w" 
       sizes="(max-width: 600px) 100vw, 
              (max-width: 1200px) 50vw, 
              800px" 
        loading="eager"
        
       alt="A beautiful tropical beach at sunset">
  
  </main>
</body>
</html>
