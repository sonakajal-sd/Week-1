<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <header>
        <h1>Native HTML5 Validation</h1>
    </header>
    <main>
        <form action="" method="" >
            <p> 
                <label for="username">Username:</label>
                <input type="text"
                id="username"
                aria-label="user-username"
                name="Username"
                minlength="3"
                maxlength="20"
                pattern="[A-Za-z0-9_]{3,20}">
            </p>
            <p>
                <label for="g-mail">Email*:</label>
                <input type="email"
                id="g-mail"
                aria-label="user-email"
                name="Email"
                required>
            </p>
            <p>
                <label for="password-user">Password</label>
                <input type="password"
                id="password-user"
                minlength="8"
                pattern="(?=.*\d).{8,}">
            </p>
            <p>
                <label for="age-field">Age:</label>
                <input type="number"
                id="age-field"
                min="18"
                max="99"
                aria-label="user-age">
            </p>
            <p>
                <label for="url-field">LinkedIn URL:</label>
                <input type="url"
                id="url-field"
                aria-label="user LinkedIn url"
                name="URL">
            </p>
            <p>
                <label for="dob">Date of birth:</label>
                <input type="date"
                id="dob"
                aria-label="date-of-birth"
                name="DOB"
                max="2026-07-20">
            </p>
            
            <p>
                <button type="submit">Submit</button>
            </p>

        </form>

    </main>
    
</body>
</html>
