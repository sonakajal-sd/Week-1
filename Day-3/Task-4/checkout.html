<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckOut</title>
</head>
<body>
    <header>
        <h1>Check Out</h1>
    </header>
    <main>
        <form action="" method="">
            <p>Fields marked *are required</p>
            <fieldset>
                <legend>Delivery Address</legend>
                <p> 
                    <label for="user-name">Name*:</label>
                    <input type="text"
                    id="user-name"
                    aria-label="User name"
                    required>
                </p>
                <p>
                    <label for="address1">Address-1</label>
                    <input type="text"
                    id="address1"
                    aria-label="Adresss 1">
                </p>
                 <p>
                    <label for="address2">Address-2</label>
                    <input type="text"
                    id="address2"
                    aria-label="Adresss 2">
                </p>
                <p>
                    <label for="city">city:</label>
                    <input type="text"
                    id="city"
                    aria-label="User City">
                </p>
                <p>
                    <label for="post-code">Post Code*:</label>
                    <input type="number"
                    id="post-code"
                    aria-label="User Post Code"
                    maxlength="6"
                    required>
                </p>
                <p>
                    <label for="country">Country:</label>
                    <input list="country-choice"
                    id="country"
                    aria-label="User Country">
                    <datalist id="country-choice">
                       <option value="India">India</option>
                       <option value="USA">USA</option>
                       <option value="Australia">Australia</option>
                       <option value="UK">UK</option>
                       <option value="Zimbabave">Zimbabave</option>
                       <option value="Pakisthan">Pakisthan</option>
                       <option value="Bangladesh">Bangladesh</option>
                       <option value="North Korea">North Korea</option>
                       <option value="South Korea">South Korea</option>
                       <option value="Asia">Asia</option>
                       <option value="Antartica">Antartica</option>
                       <option value="china">china</option>
                       <option value="Japan">Japan</option>
                       <option value="Uzbekisthan">Uzbekisthan</option>
                       <option value="Kurdisthan">Kurdisthan</option>
                       <option value="Bhutan">Bhutan</option>
                       <option value="Finland">Finland</option>
                       <option value="Switerzland">Switerzland</option>
                       <option value="Srilanka">Srilanka</option>
                       <option value="Andhaman">Andhanam</option>
                       <option value="Western">Western</option>
                       <option value="Africa">Africa</option>
                       <option value="Chicago">Chicago</option>
                       <option value="ley">ley</option>
                       <option value="Amazon">Amazon</option>
                    </datalist>
                </p>
            </fieldset>

            <fieldset >
                <legend>Payment Details</legend>
                <p>
                    <label for="card-num">Card Number*:</label>
                    <input type="number"
                    id="card-num"
                    maxlength="16"
                    aria-label="User card number"
                    required>
                </p>
                <p>
                    <label for="expire-month">Expire Month and Year:</label>
                    <input type="date"
                    id="expire-month" 
                    aria-label="card expiring month">
                </p>
               <p> 
                <label for="cvv">CVV*:</label>
                <input type="password"
                id="cvv"
                maxlength="4"
                aria-label=" User-CVV"
                aria-describedby="cv"
                required>
                <p id="cv">3 or 4 digits on the back of your card</p>
               </p>
            </fieldset>
            <fieldset>
                <legend >Order Notes</legend>
                <p><label for="text-area">Queries(optional)</label></p>
                <textarea maxlength="500" rows="10" cols="50" aria-label="Text Area" id="text-area">
                   

                </textarea>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
    </main>
    
</body>
</html>
